name: Close obsolete Snyk PRs

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - .github/workflows/close-snyk-prs.yml

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  close-snyk-prs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const comment = [
              'Closing: legacy Rails/CRA dependencies superseded by the `demo/` rebuild on master (PR #110).',
              'These automated Snyk fixes target unmaintained reference code and are no longer needed.'
            ].join(' ');

            let page = 1;
            let closed = 0;

            while (true) {
              const { data: prs } = await github.rest.pulls.list({
                owner,
                repo,
                state: 'open',
                per_page: 100,
                page,
              });

              if (prs.length === 0) break;

              for (const pr of prs) {
                const isSnyk =
                  pr.head.ref.startsWith('snyk-fix-') || pr.title.includes('[Snyk]');
                if (!isSnyk) continue;

                try {
                  await github.rest.issues.createComment({
                    owner,
                    repo,
                    issue_number: pr.number,
                    body: comment,
                  });
                } catch (error) {
                  core.warning(`Could not comment on PR #${pr.number}: ${error.message}`);
                }

                await github.rest.pulls.update({
                  owner,
                  repo,
                  pull_number: pr.number,
                  state: 'closed',
                });

                try {
                  await github.rest.git.deleteRef({
                    owner,
                    repo,
                    ref: `heads/${pr.head.ref}`,
                  });
                } catch (error) {
                  core.warning(`Could not delete branch ${pr.head.ref}: ${error.message}`);
                }

                closed += 1;
                core.info(`Closed PR #${pr.number} (${pr.head.ref})`);
              }

              page += 1;
            }

            let refPage = 1;
            while (true) {
              const { data: refs } = await github.rest.git.listMatchingRefs({
                owner,
                repo,
                ref: 'heads/snyk-fix-',
                per_page: 100,
                page: refPage,
              });

              if (refs.length === 0) break;

              for (const ref of refs) {
                try {
                  await github.rest.git.deleteRef({ owner, repo, ref: ref.ref });
                  core.info(`Deleted leftover branch ${ref.ref}`);
                } catch (error) {
                  core.warning(`Could not delete ${ref.ref}: ${error.message}`);
                }
              }

              refPage += 1;
            }

            core.info(`Closed ${closed} Snyk pull requests.`);
